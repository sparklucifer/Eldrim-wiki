<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Eldrim Cards — Character Codex</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#C9A84C;--gold-light:#E8C97A;--gold-dim:#7A6130;
  --ink:#0D0B08;--parchment:#F5EDD8;--parchment-dim:#E8DBBF;
  --ember:#C4421A;--ember-light:#E8632A;
  --frost:#3A7EA8;--frost-light:#5BA3CC;
  --verdant:#2E7D4F;--verdant-light:#4AA86E;
  --shadow:#1A1510;--panel-bg:rgba(13,11,8,0.96);--card-bg:rgba(18,14,8,0.99);
  --border:rgba(201,168,76,0.25);--border-bright:rgba(201,168,76,0.65);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--ink);color:var(--parchment);font-family:'Crimson Pro',Georgia,serif;overflow:hidden;height:100vh;width:100vw;}
#bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 20% 50%,#1a1208 0%,#0D0B08 55%,#060402 100%);}
.bg-rune{position:absolute;font-family:'Cinzel',serif;color:rgba(201,168,76,0.03);pointer-events:none;user-select:none;}
#header{position:fixed;top:0;left:0;right:0;z-index:100;padding:14px 28px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(180deg,rgba(13,11,8,0.97) 0%,transparent 100%);border-bottom:1px solid var(--border);}
#header h1{font-family:'Cinzel',serif;font-size:20px;font-weight:600;letter-spacing:0.1em;color:var(--gold);text-shadow:0 0 30px rgba(201,168,76,0.35);}
#header h1 span{color:var(--parchment);font-weight:400;font-size:12px;letter-spacing:0.2em;display:block;margin-top:1px;opacity:0.5;}
#controls{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.filter-btn{font-family:'Cinzel',serif;font-size:10px;letter-spacing:0.1em;padding:5px 12px;background:transparent;border:1px solid var(--border);color:rgba(245,237,216,0.45);cursor:pointer;transition:all 0.2s;text-transform:uppercase;}
.filter-btn:hover,.filter-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,0.1);}
#search-wrap{position:relative;margin-left:6px;}
#search{font-family:'Crimson Pro',serif;font-size:13px;padding:5px 12px 5px 28px;background:rgba(201,168,76,0.06);border:1px solid var(--border);color:var(--parchment);outline:none;width:180px;transition:all 0.2s;}
#search:focus{border-color:var(--gold-dim);background:rgba(201,168,76,0.1);}
#search::placeholder{color:rgba(245,237,216,0.3);font-style:italic;}
.si{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:rgba(201,168,76,0.4);font-size:12px;pointer-events:none;}
#graph-container{position:fixed;inset:0;z-index:1;}
svg#graph{width:100%;height:100%;}
.node-group{cursor:pointer;}
.node-ring{fill:none;stroke-width:1.5;opacity:0;transition:opacity 0.3s;}
.node-group:hover .node-ring{opacity:1;}
.node-circle{transition:filter 0.25s;}
.node-group:hover .node-circle{filter:brightness(1.5);}
.node-label{font-family:'Cinzel',serif;font-size:10px;fill:rgba(245,237,216,0.82);text-anchor:middle;pointer-events:none;letter-spacing:0.04em;}
.node-sublabel{font-family:'Crimson Pro',serif;font-size:9px;fill:rgba(245,237,216,0.38);text-anchor:middle;pointer-events:none;font-style:italic;}
.link{stroke-opacity:0.3;fill:none;transition:stroke-opacity 0.3s;}
.link.hl{stroke-opacity:0.9;stroke-width:2.5;}
.link.dim{stroke-opacity:0.04;}
.node-group.dim .node-circle{opacity:0.12;}
.node-group.dim .node-label,.node-group.dim .node-sublabel{opacity:0.12;}
.node-group.sel .node-ring{opacity:1;}
@keyframes gp{0%,100%{filter:drop-shadow(0 0 5px currentColor);}50%{filter:drop-shadow(0 0 16px currentColor);}}
.node-group.sel .node-circle{animation:gp 2s ease-in-out infinite;}
#legend{position:fixed;bottom:20px;left:28px;z-index:100;}
.leg-title{font-family:'Cinzel',serif;font-size:9px;letter-spacing:0.15em;color:var(--gold-dim);text-transform:uppercase;margin-bottom:5px;}
.leg-item{display:flex;align-items:center;gap:7px;font-family:'Crimson Pro',serif;font-size:11px;color:rgba(245,237,216,0.5);margin-bottom:3px;}
.leg-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.leg-line{width:20px;height:2px;flex-shrink:0;border-radius:1px;}
#char-panel{position:fixed;top:0;right:-460px;width:430px;height:100vh;z-index:200;background:var(--card-bg);border-left:1px solid var(--border);transition:right 0.38s cubic-bezier(0.25,0.46,0.45,0.94);overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--gold-dim) transparent;}
#char-panel.open{right:0;}
.ph{position:sticky;top:0;padding:24px 26px 18px;background:var(--card-bg);border-bottom:1px solid var(--border);z-index:1;}
.pc{position:absolute;top:18px;right:18px;background:none;border:none;color:var(--gold-dim);font-size:18px;cursor:pointer;font-family:'Cinzel',serif;transition:color 0.2s;line-height:1;}
.pc:hover{color:var(--gold);}
.role-badge{font-family:'Cinzel',serif;font-size:9px;letter-spacing:0.18em;text-transform:uppercase;padding:3px 10px;border:1px solid;display:inline-block;margin-bottom:8px;}
.char-name{font-family:'Cinzel',serif;font-size:24px;font-weight:600;color:var(--gold);line-height:1.2;text-shadow:0 0 20px rgba(201,168,76,0.25);}
.char-aliases{font-family:'Crimson Pro',serif;font-style:italic;font-size:14px;color:rgba(245,237,216,0.45);margin-top:3px;}
.char-status{margin-top:8px;font-family:'Crimson Pro',serif;font-size:13px;}
.sa{color:#4AA86E;}.sd{color:#C4421A;}.sp{color:#E8632A;}.su{color:rgba(245,237,216,0.4);}
.pb{padding:22px 26px;}
.sec{margin-bottom:24px;}
.sec-title{font-family:'Cinzel',serif;font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:var(--gold-dim);margin-bottom:10px;padding-bottom:5px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:7px;}
.sec-title::before{content:'';display:inline-block;width:4px;height:4px;background:var(--gold-dim);transform:rotate(45deg);}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.stat-item{background:rgba(201,168,76,0.04);border:1px solid var(--border);padding:9px 12px;}
.stat-label{font-family:'Cinzel',serif;font-size:8px;letter-spacing:0.14em;color:var(--gold-dim);text-transform:uppercase;margin-bottom:3px;}
.stat-val{font-family:'Crimson Pro',serif;font-size:13px;color:var(--parchment);}
.stars{color:var(--gold);letter-spacing:1px;font-size:12px;}
.stars-e{color:rgba(201,168,76,0.18);}
.tl{position:relative;padding-left:18px;}
.tl::before{content:'';position:absolute;left:5px;top:6px;bottom:0;width:1px;background:var(--border);}
.tl-item{position:relative;margin-bottom:12px;font-family:'Crimson Pro',serif;font-size:12px;}
.tl-item::before{content:'';position:absolute;left:-15px;top:5px;width:6px;height:6px;border-radius:50%;background:var(--gold-dim);border:1px solid var(--gold);}
.tl-ch{font-family:'Cinzel',serif;font-size:8px;letter-spacing:0.1em;color:var(--gold-dim);margin-bottom:1px;}
.tl-text{color:rgba(245,237,216,0.65);line-height:1.4;}
.card-item{background:rgba(201,168,76,0.04);border:1px solid var(--border);padding:11px 13px;margin-bottom:8px;}
.card-name{font-family:'Cinzel',serif;font-size:12px;color:var(--gold-light);margin-bottom:5px;}
.card-meta{display:flex;gap:6px;margin-bottom:5px;flex-wrap:wrap;}
.card-tag{font-family:'Cinzel',serif;font-size:8px;letter-spacing:0.1em;padding:2px 7px;border:1px solid var(--border);color:rgba(245,237,216,0.45);text-transform:uppercase;}
.card-abil{font-family:'Crimson Pro',serif;font-size:12px;color:rgba(245,237,216,0.6);font-style:italic;line-height:1.5;}
.flavour{font-family:'Crimson Pro',serif;font-size:11px;color:rgba(245,237,216,0.3);font-style:italic;margin-top:5px;border-left:2px solid var(--gold-dim);padding-left:7px;}
.uf{color:var(--ember-light);font-size:10px;}
.rel-item{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid rgba(201,168,76,0.07);cursor:pointer;transition:background 0.15s;}
.rel-item:hover{background:rgba(201,168,76,0.04);margin:0 -13px;padding:7px 13px;}
.rel-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.rel-name{font-family:'Crimson Pro',serif;font-size:13px;color:var(--parchment);flex:1;}
.rel-type{font-family:'Cinzel',serif;font-size:8px;letter-spacing:0.1em;color:rgba(245,237,216,0.35);text-transform:uppercase;}
.rel-desc{font-size:11px;color:rgba(245,237,216,0.4);font-style:italic;}
.org-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border:1px solid;font-family:'Crimson Pro',serif;font-size:12px;margin-bottom:5px;}
.org-dot{width:6px;height:6px;border-radius:50%;}
#tooltip{position:fixed;background:var(--card-bg);border:1px solid var(--border-bright);padding:9px 14px;pointer-events:none;z-index:300;opacity:0;transition:opacity 0.12s;max-width:200px;}
#tooltip.vis{opacity:1;}
.tt-name{font-family:'Cinzel',serif;font-size:12px;color:var(--gold);margin-bottom:2px;}
.tt-sub{font-family:'Crimson Pro',serif;font-size:11px;color:rgba(245,237,216,0.5);font-style:italic;}
#zoom-controls{position:fixed;bottom:20px;right:28px;z-index:100;display:flex;flex-direction:column;gap:3px;}
.zoom-btn{width:30px;height:30px;background:rgba(13,11,8,0.92);border:1px solid var(--border);color:var(--gold-dim);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;font-family:'Cinzel',serif;line-height:1;}
.zoom-btn:hover{border-color:var(--gold);color:var(--gold);}
#org-filters{position:fixed;top:76px;left:50%;transform:translateX(-50%);z-index:100;display:flex;gap:5px;flex-wrap:wrap;justify-content:center;max-width:900px;padding:6px;pointer-events:none;}
.org-pill{font-family:'Cinzel',serif;font-size:8px;letter-spacing:0.1em;padding:3px 10px;border:1px solid;cursor:pointer;pointer-events:all;text-transform:uppercase;transition:all 0.2s;opacity:0.45;}
.org-pill:hover,.org-pill.active{opacity:1;}
#stats-bar{position:fixed;top:76px;right:28px;z-index:100;font-family:'Cinzel',serif;font-size:9px;letter-spacing:0.1em;color:var(--gold-dim);text-align:right;line-height:1.8;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
#header{animation:fadeUp 0.5s ease both;}
#legend{animation:fadeUp 0.5s ease 0.2s both;}
</style>
</head>
<body>
<div id="bg">
  <div class="bg-rune" style="top:8%;left:4%;font-size:100px">☽</div>
  <div class="bg-rune" style="top:65%;left:88%;font-size:90px">⚔</div>
  <div class="bg-rune" style="top:82%;left:8%;font-size:80px">✦</div>
  <div class="bg-rune" style="top:15%;left:72%;font-size:110px">◈</div>
  <div class="bg-rune" style="top:40%;left:48%;font-size:280px;opacity:0.012">✦</div>
</div>
<div id="header">
  <h1>THE ELDRIM CARDS <span>CHARACTER CODEX · CH 1–216</span></h1>
  <div id="controls">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="Alive">Alive</button>
    <button class="filter-btn" data-filter="Dead">Dead</button>
    <button class="filter-btn" data-filter="Main">Main</button>
    <button class="filter-btn" data-filter="Secondary">Secondary</button>
    <button class="filter-btn" data-filter="Antagonist">Antagonist</button>
    <div id="search-wrap">
      <span class="si">⌕</span>
      <input type="text" id="search" placeholder="Search characters…">
    </div>
  </div>
</div>
<div id="org-filters"></div>
<div id="stats-bar"></div>
<div id="graph-container"><svg id="graph"></svg></div>
<div id="legend">
  <div class="leg-title">Organizations</div>
  <div id="legend-orgs"></div>
  <div class="leg-title" style="margin-top:10px">Relationships</div>
  <div class="leg-item"><div class="leg-line" style="background:#4AA86E"></div>Ally</div>
  <div class="leg-item"><div class="leg-line" style="background:#C4421A"></div>Enemy</div>
  <div class="leg-item"><div class="leg-line" style="background:#3A7EA8"></div>Family</div>
  <div class="leg-item"><div class="leg-line" style="background:#E8C97A"></div>Rival</div>
  <div class="leg-item"><div class="leg-line" style="background:#9B59B6"></div>Romantic</div>

  <div class="leg-item"><div class="leg-dot" style="background:#4AA86E"></div>Alive</div>
  <div class="leg-item"><div class="leg-dot" style="background:#C4421A"></div>Dead</div>
  <div class="leg-item"><div class="leg-dot" style="background:#E8632A"></div>Presumed Dead</div>
  <div class="leg-item"><div class="leg-dot" style="background:#888"></div>Unknown</div>
</div>
<div id="zoom-controls">
  <button class="zoom-btn" id="zi">+</button>
  <button class="zoom-btn" id="zo">−</button>
  <button class="zoom-btn" id="zr" style="font-size:11px;font-family:'Cinzel',serif">↺</button>
</div>
<div id="char-panel">
  <div class="ph">
    <button class="pc" id="panel-close">✕</button>
    <div id="p-badge" class="role-badge"></div>
    <div id="p-name" class="char-name"></div>
    <div id="p-aliases" class="char-aliases"></div>
    <div id="p-status" class="char-status"></div>
  </div>
  <div class="pb" id="p-body"></div>
</div>
<div id="tooltip"><div class="tt-name" id="tt-name"></div><div class="tt-sub" id="tt-sub"></div></div>

<script>
const CHARACTERS=[{"id":"nero_grant","name":"Nero Grant","aliases":["Kid","Subject S-28"],"role":"Main","gender":"Male","age":"15-16","origin":"Aetherpeak, Kolar","status_timeline":[{"ch_start":1,"ch_end":216,"status":"Alive"}],"cultivation_timeline":[{"ch_start":1,"ch_end":4,"rank":"Unstabilised","stars":0},{"ch_start":5,"ch_end":216,"rank":"Neophyte","stars":1}],"profession":{"name":null,"ch_acquired":null,"uncertain":false},"organizations":[{"name":"Kolar Military","role":"Private/Draftee","ch_start":131,"ch_end":null},{"name":"Azure-1","role":"Leader","ch_start":129,"ch_end":null},{"name":"Unity","role":"Conditionally engaged","ch_start":210,"ch_end":null}],"appearance":"Brown hair turning cobalt blue post-synchronisation; clear blue eyes; well-built; full-back black tribal tattoo","background":"15-year-old from Aetherpeak. Father is Whisper Guard; mother is Mystic+Monarch. Older brother Patrick was falsely sentenced to the front lines by Jacob Dom. 51st-generation descendant of Soren Daelor (Eldrim-era), Genetic Marker S-28. Two years of intense self-training before synchronisation. Secretly married Irene Hammel to Patrick before deployment.","innate_cards":[{"name":"Cryoflame","type":"Elemental (fire/ice hybrid)","stars":0,"ability":"Consumes heat and produces aetheric flames, leaving behind a frozen kingdom. Evolved Ch 197: formerly self-propagating flames; now each flame requires aether supply but drains all ambient heat for metres around and grows more powerful as it absorbs heat.","flavour_text":"The death of a Kolari is written, and it is on the battlefield — Marilyn Grant","image_desc":"Nero himself with cobalt blue hair and eyes, blue flame in hand","confirmed":true,"inferred_from_ch":[5]},{"name":"Virtuous Moonlight","type":"Luminari","stars":null,"ability":"Emits silver light in a 1-metre radius; repels and disintegrates blood-based curses and blood curse entities; massive aether drain; cannot coexist with Cryoflame — must switch between them (takes a few seconds); unranked X card; second innate ability, unprecedented in recorded history.","flavour_text":"When the banners of GriNovelBinerge fell, when the armies of the Wardens retreated, when the mysts of Hjorflow spread, all that remained was the memory of a better time — Karv La Heim","image_desc":"Sleek black silhouette like a ribbon; small circle near the base like an eye or focal point","confirmed":true,"inferred_from_ch":[213,214]}],"acquired_cards":[{"name":"Muted Self","type":"Stealth","stars":0,"ability":"Eliminate sounds produced by the caster for 20 seconds","ch_obtained":1,"ch_lost":null},{"name":"Endless Echoes","type":"Sound/Illusion","stars":0,"ability":"Repeat a sound on a loop; duration scales with aether","ch_obtained":1,"ch_lost":null},{"name":"Snowflake (Marilyns innate)","type":"Elemental (cryo)","stars":0,"ability":"Produces sharp flaming snowflakes; acts as fuel for Cryoflame; resilient against cursed energy smothering. Fading from Ch 208.","ch_obtained":3,"ch_lost":null},{"name":"Luminalink (Edwards innate)","type":"Communication","stars":0,"ability":"Transmit any information using light; infinitely versatile","ch_obtained":3,"ch_lost":187},{"name":"FAK","type":"Healing","stars":0,"ability":"Stop external bleeding from small to medium wounds for 10 minutes","ch_obtained":14,"ch_lost":null},{"name":"Raise the Dead","type":"Rejuvenation","stars":0,"ability":"Mildly rejuvenate from exhaustion; eliminate need for sleep for a few hours","ch_obtained":14,"ch_lost":null},{"name":"Arithmetic Perception","type":"Mental/Sensing","stars":0,"ability":"Break down surroundings into precise geometric/numerical perception; durability depleted Ch 120","ch_obtained":60,"ch_lost":120},{"name":"Radix Augmentation","type":"Augmentation","stars":0,"ability":"Use dead organisms to absorb vitality; each kill enhances aether absorption and body strength. Self-crafted; Soren family legacy.","ch_obtained":128,"ch_lost":null},{"name":"Flare","type":"Elemental","star const ORG_COLORS={
  'Kolar Military':'#C9A84C','Whisper Guard':'#A0C4E8','Azure-1':'#E87A3A',
  'Unity':'#9B59B6','Lumina':'#5BCCA8','Mount Aidin School':'#7EC8A0',
  'AAB':'#C85B5B','New Velariya':'#5B8EC8','Verdant-2':'#4AA86E',
  'Nova Intelligence':'#C8A85B','Other':'#888','Unknown':'#555'
};
const REL_COLORS={
  'Ally':'#4AA86E','Enemy':'#C4421A','Family':'#3A7EA8','Rival':'#E8C97A',
  'Romantic':'#9B59B6','Mentor':'#888','Unknown':'#555'
};
const ROLE_SIZE={'Main':32,'Secondary':18,'Antagonist':24,'Minor':11};
const ROLE_BADGE={
  'Main':{bg:'rgba(201,168,76,0.15)',bc:'#C9A84C',c:'#E8C97A'},
  'Secondary':{bg:'rgba(58,126,168,0.15)',bc:'#3A7EA8',c:'#5BA3CC'},
  'Antagonist':{bg:'rgba(196,66,26,0.15)',bc:'#C4421A',c:'#E8632A'},
  'Minor':{bg:'rgba(100,100,100,0.12)',bc:'#555',c:'#888'}
};

const svg=d3.select('#graph');
const cont=document.getElementById('graph-container');
let W=cont.offsetWidth,H=cont.offsetHeight;
const g=svg.append('g').attr('class','root');

const zoom=d3.zoom().scaleExtent([0.1,4]).on('zoom',e=>g.attr('transform',e.transform));
svg.call(zoom);
document.getElementById('zi').onclick=()=>svg.transition().duration(300).call(zoom.scaleBy,1.3);
document.getElementById('zo').onclick=()=>svg.transition().duration(300).call(zoom.scaleBy,0.77);
document.getElementById('zr').onclick=()=>svg.transition().duration(400).call(zoom.transform,d3.zoomIdentity.translate(W/2,H/2).scale(0.7));

// Build deduped links
const linkMap=new Set();
const links=[];
CHARACTERS.forEach(ch=>{
  (ch.relationships||[]).forEach(rel=>{
    const tgt=CHARACTERS.find(c=>c.id===rel.target_id);
    if(!tgt) return;
    const key=[ch.id,rel.target_id].sort().join('||')+rel.type;
    if(linkMap.has(key)) return;
    linkMap.add(key);
    links.push({source:ch.id,target:rel.target_id,type:rel.type,description:rel.description,ch_start:rel.ch_start});
  });
});

const sim=d3.forceSimulation(CHARACTERS)
  .force('link',d3.forceLink(links).id(d=>d.id).distance(d=>{
    if(d.type==='Family') return 90;
    if(d.type==='Mentor') return 110;
    if(d.type==='Ally') return 140;
    return 160;
  }).strength(0.3))
  .force('charge',d3.forceManyBody().strength(d=>d.role==='Main'?-800:d.role==='Minor'?-150:-350))
  .force('center',d3.forceCenter(W/2,H/2))
  .force('collision',d3.forceCollide().radius(d=>ROLE_SIZE[d.role]+20))
  .force('x',d3.forceX(W/2).strength(0.03))
  .force('y',d3.forceY(H/2).strength(0.03));

const linkEl=g.append('g').selectAll('line').data(links).join('line')
  .attr('class','link')
  .attr('stroke',d=>REL_COLORS[d.type]||'#888')
  .attr('stroke-width',d=>d.type==='Enemy'?1.5:0.8)
  .attr('stroke-dasharray',d=>d.type==='Mentor'?'4 3':d.type==='Unknown'?'2 3':null);

const nodeEl=g.append('g').selectAll('g').data(CHARACTERS).join('g')
  .attr('class','node-group')
  .call(d3.drag()
    .on('start',(e,d)=>{if(!e.active)sim.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y;})
    .on('drag',(e,d)=>{d.fx=e.x;d.fy=e.y;})
    .on('end',(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null;}));

nodeEl.append('circle').attr('class','node-ring')
  .attr('r',d=>ROLE_SIZE[d.role]+9)
  .attr('stroke',d=>ORG_COLORS[d._primary_org]||'#888')
  .attr('stroke-opacity',0.55).attr('fill','none');

nodeEl.append('circle').attr('class','node-circle')
  .attr('r',d=>ROLE_SIZE[d.role])
  .attr('fill',d=>ORG_COLORS[d._primary_org]||'#888')
  .attr('fill-opacity',d=>d.role==='Main'?0.4:d.role==='Antagonist'?0.3:0.18)
  .attr('stroke',d=>ORG_COLORS[d._primary_org]||'#888')
  .attr('stroke-width',d=>d.role==='Main'?2.5:d.role==='Antagonist'?2:1);

nodeEl.append('circle')
  .attr('r',d=>d.role==='Main'?6:4)
  .attr('cx',d=>ROLE_SIZE[d.role]*0.6).attr('cy',d=>-ROLE_SIZE[d.role]*0.6)
  .attr('fill',d=>{
    const s=d._status;
    return s==='Alive'?'#4AA86E':s==='Dead'?'#C4421A':s==='Presumed Dead'?'#E8632A':'#888';
  })
  .attr('stroke','#0D0B08').attr('stroke-width',1.5);

nodeEl.append('text').attr('class','node-label')
  .attr('y',d=>ROLE_SIZE[d.role]+13)
  .text(d=>d.name.length>16?d.name.split(' ')[0]:d.name);

nodeEl.append('text').attr('class','node-sublabel')
  .attr('y',d=>ROLE_SIZE[d.role]+23)
  .text(d=>{
    if(d.role==='Main') return '★ Protagonist';
    if(d.role==='Antagonist') return '⚔ Antagonist';
    const r=d.cultivation_timeline?.slice(-1)[0];
    return r?r.rank:'';
  });

const tt=document.getElementById('tooltip');
nodeEl
  .on('mouseenter',(e,d)=>{
    const r=d.cultivation_timeline?.slice(-1)[0];
    document.getElementById('tt-name').textContent=d.name;
    document.getElementById('tt-sub').textContent=`${d._status} · ${r?.rank||'?'} · ${d._primary_org} · Ch ${d.first_appearance?.ch||'?'}`;
    tt.classList.add('vis');
  })
  .on('mousemove',e=>{tt.style.left=(e.clientX+14)+'px';tt.style.top=(e.clientY-10)+'px';})
  .on('mouseleave',()=>tt.classList.remove('vis'))
  .on('click',(e,d)=>{e.stopPropagation();openPanel(d);highlightNode(d);});

sim.on('tick',()=>{
  linkEl.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
        .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
  nodeEl.attr('transform',d=>`translate(${d.x},${d.y})`);
});

svg.on('click',()=>{closePanel();clearHL();});

// Initial zoom to fit
sim.on('end',()=>{
  svg.transition().duration(600).call(zoom.transform,d3.zoomIdentity.translate(W/2,H/2).scale(0.65));
});

function highlightNode(d){
  const conn=new Set([d.id]);
  links.forEach(l=>{
    if(l.source.id===d.id)conn.add(l.target.id);
    if(l.target.id===d.id)conn.add(l.source.id);
  });
  nodeEl.classed('dim',n=>!conn.has(n.id));
  nodeEl.classed('sel',n=>n.id===d.id);
  linkEl.classed('hl',l=>l.source.id===d.id||l.target.id===d.id);
  linkEl.classed('dim',l=>l.source.id!==d.id&&l.target.id!==d.id);
}
function clearHL(){nodeEl.classed('dim sel',false);linkEl.classed('hl dim',false);}

// Panel rendering
function openPanel(d){
  const rc=ROLE_BADGE[d.role]||ROLE_BADGE['Minor'];
  const ls=d.status_timeline?.slice(-1)[0]||{};
  const sc=ls.status?.startsWith('Alive')?'sa':ls.status?.toLowerCase().includes('dead')||ls.status?.toLowerCase().includes('deceased')?'sd':ls.status?.toLowerCase().includes('presumed')?'sp':'su';
  document.getElementById('p-badge').textContent=d.role;
  document.getElementById('p-badge').style.cssText=`background:${rc.bg};border-color:${rc.bc};color:${rc.c}`;
  document.getElementById('p-name').textContent=d.name;
  document.getElementById('p-aliases').textContent=d.aliases?.length?d.aliases.join(' · '):'';
  let stHTML=`<span class="${sc}">● ${ls.status||'Unknown'}</span>`;
  if(ls.cause) stHTML+=`<span style="color:rgba(245,237,216,0.35);margin-left:8px;font-style:italic">— ${ls.cause}</span>`;
  document.getElementById('p-status').innerHTML=stHTML;

  let h='';

  // Identity
  const lr=d.cultivation_timeline?.slice(-1)[0];
  const stars=lr?.stars?'★'.repeat(lr.stars)+'<span class="stars-e">'+'★'.repeat(Math.max(0,3-lr.stars))+'</span>':'—';
  h+=`<div class="sec"><div class="sec-title">Identity</div><div class="stat-grid">
    <div class="stat-item"><div class="stat-label">Gender</div><div class="stat-val">${d.gender||'—'}</div></div>
    <div class="stat-item"><div class="stat-label">Age</div><div class="stat-val">${d.age||'—'}</div></div>
    <div class="stat-item"><div class="stat-label">Origin</div><div class="stat-val">${d.origin||'—'}</div></div>
    <div class="stat-item"><div class="stat-label">First Seen</div><div class="stat-val">Ch ${d.first_appearance?.ch||'?'}</div></div>
    <div class="stat-item"><div class="stat-label">Current Rank</div><div class="stat-val"><span class="stars">${stars}</span> ${lr?.rank||'—'}</div></div>
    ${d.profession?.name?`<div class="stat-item"><div class="stat-label">Profession</div><div class="stat-val">${d.profession.name}${d.profession.uncertain?' <span class="uf">⚠️</span>':''}</div></div>`:'<div class="stat-item"><div class="stat-label">Profession</div><div class="stat-val" style="color:rgba(245,237,216,0.3)">Not yet</div></div>'}
  </div></div>`;

  // Cultivation timeline
  if(d.cultivation_timeline?.length>1){
    h+=`<div class="sec"><div class="sec-title">Cultivation Timeline</div><div class="tl">`;
    d.cultivation_timeline.forEach(c=>{
      const s=c.stars?'<span class="stars">'+'★'.repeat(c.stars)+'</span><span class="stars-e">'+'★'.repeat(Math.max(0,3-c.stars))+'</span>':'';
      h+=`<div class="tl-item"><div class="tl-ch">Ch ${c.ch_start}${c.ch_end&&c.ch_end!==c.ch_start?'–'+c.ch_end:'+'}</div><div class="tl-text">${s} ${c.rank}</div></div>`;
    });
    h+=`</div></div>`;
  }

  // Status timeline if complex
  if(d.status_timeline?.length>1){
    h+=`<div class="sec"><div class="sec-title">Status Timeline</div><div class="tl">`;
    d.status_timeline.forEach(s=>{
      h+=`<div class="tl-item"><div class="tl-ch">Ch ${s.ch_start}${s.ch_end&&s.ch_end!==s.ch_start?'–'+s.ch_end:'+'}</div><div class="tl-text">${s.status}${s.cause?' — '+s.cause:''}</div></div>`;
    });
    h+=`</div></div>`;
  }

  // Organizations
  if(d.organizations?.length){
    h+=`<div class="sec"><div class="sec-title">Organizations</div>`;
    d.organizations.forEach(org=>{
      const col=ORG_COLORS[org._norm||'Other']||'#888';
      h+=`<div class="org-badge" style="border-color:${col}44;color:${col}"><span class="org-dot" style="background:${col}"></span>${org.name}<span style="color:rgba(245,237,216,0.35);font-size:10px;margin-left:4px">· ${org.role} · Ch ${org.ch_start}${org.ch_end?'–'+org.ch_end:'+'}</span></div><br>`;
    });
    h+=`</div>`;
  }

  // Appearance
  if(d.appearance){
    h+=`<div class="sec"><div class="sec-title">Appearance</div><p style="font-family:'Crimson Pro',serif;font-size:13px;color:rgba(245,237,216,0.6);line-height:1.6;font-style:italic">${d.appearance}</p></div>`;
  }

  // Background
  if(d.background){
    h+=`<div class="sec"><div class="sec-title">Background</div><p style="font-family:'Crimson Pro',serif;font-size:13px;color:rgba(245,237,216,0.6);line-height:1.6">${d.background}</p></div>`;
  }

  // Innate cards
  if(d.innate_cards?.length){
    h+=`<div class="sec"><div class="sec-title">Innate Card${d.innate_cards.length>1?'s':''}</div>`;
    d.innate_cards.forEach(card=>{
      const s=card.stars?'<span class="stars">'+'★'.repeat(card.stars)+'</span>':'<span class="uf">⚠️ Unranked</span>';
      h+=`<div class="card-item">
        <div class="card-name">${card.name||'Unknown'}${!card.confirmed?' <span class="uf">⚠️</span>':''}</div>
        <div class="card-meta">
          ${card.type?`<span class="card-tag">${card.type}</span>`:''}
          <span class="card-tag">${s}</span>
          <span class="card-tag" style="border-color:${card.confirmed?'#4AA86E44':'#C4421A44'};color:${card.confirmed?'#4AA86E':'#E8632A'}">${card.confirmed?'Confirmed':'Inferred'}</span>
        </div>
        <div class="card-abil">${card.ability||'—'}</div>
        ${card.flavour_text?`<div class="flavour">${card.flavour_text}</div>`:''}
        ${card.image_desc?`<div style="font-size:10px;color:rgba(245,237,216,0.3);margin-top:4px;font-family:'Cinzel',serif;letter-spacing:0.08em">IMAGE: ${card.image_desc}</div>`:''}
        ${card.inferred_from_ch?.length?`<div style="font-size:10px;color:rgba(245,237,216,0.25);margin-top:4px;font-family:'Crimson Pro',serif">Observed: Ch ${card.inferred_from_ch.join(', ')}</div>`:''}
      </div>`;
    });
    h+=`</div>`;
  }

  // Acquired cards
  if(d.acquired_cards?.length){
    h+=`<div class="sec"><div class="sec-title">Acquired Cards (${d.acquired_cards.length})</div>`;
    d.acquired_cards.forEach(card=>{
      const s=card.stars?'<span class="stars">'+'★'.repeat(card.stars)+'</span><span class="stars-e">'+'★'.repeat(Math.max(0,3-card.stars))+'</span>':'—';
      h+=`<div class="card-item">
        <div class="card-name">${card.name}</div>
        <div class="card-meta">
          ${card.type?`<span class="card-tag">${card.type}</span>`:''}
          <span class="card-tag">${s}</span>
          <span class="card-tag" style="color:rgba(245,237,216,0.35)">Ch ${card.ch_obtained}${card.ch_lost?'–'+card.ch_lost:'+'}</span>
        </div>
        <div class="card-abil">${card.ability||'—'}</div>
        ${card.flavour_text?`<div class="flavour">${card.flavour_text}</div>`:''}
      </div>`;
    });
    h+=`</div>`;
  }

  // Relationships
  if(d.relationships?.length){
    h+=`<div class="sec"><div class="sec-title">Relationships (${d.relationships.length})</div>`;
    d.relationships.forEach(rel=>{
      const tgt=CHARACTERS.find(c=>c.id===rel.target_id);
      if(!tgt) return;
      const col=REL_COLORS[rel.type]||'#888';
      h+=`<div class="rel-item" onclick="jumpTo('${rel.target_id}')">
        <div class="rel-dot" style="background:${col}"></div>
        <div>
          <div class="rel-name">${tgt.name} <span class="rel-type">${rel.type}</span></div>
          ${rel.description?`<div class="rel-desc">${rel.description}</div>`:''}
          ${rel.ch_start?`<div style="font-size:10px;color:rgba(245,237,216,0.25);font-family:'Cinzel',serif;letter-spacing:0.08em">Ch ${rel.ch_start}${rel.ch_end?'–'+rel.ch_end:'+'} </div>`:''}
        </div>
      </div>`;
    });
    h+=`</div>`;
  }

  // Events
  if(d.events?.length){
    h+=`<div class="sec"><div class="sec-title">Story Events</div><div class="tl">`;
    d.events.forEach(ev=>{
      h+=`<div class="tl-item">
        <div class="tl-ch">${ev.name} · Ch ${ev.ch_start}${ev.ch_end&&ev.ch_end!==ev.ch_start?'–'+ev.ch_end:''}</div>
        <div class="tl-text"><em>${ev.role}</em> — ${ev.outcome}</div>
      </div>`;
    });
    h+=`</div></div>`;
  }

  // Notable moments
  if(d.notable_moments?.length){
    h+=`<div class="sec"><div class="sec-title">Notable Moments</div><div class="tl">`;
    d.notable_moments.forEach(m=>{
      h+=`<div class="tl-item"><div class="tl-ch">Ch ${m.ch}</div><div class="tl-text">${m.description}</div></div>`;
    });
    h+=`</div></div>`;
  }

  document.getElementById('p-body').innerHTML=h;
  document.getElementById('char-panel').classList.add('open');
}

function closePanel(){document.getElementById('char-panel').classList.remove('open');}
document.getElementById('panel-close').onclick=e=>{e.stopPropagation();closePanel();clearHL();};
function jumpTo(id){const d=CHARACTERS.find(c=>c.id===id);if(d){openPanel(d);highlightNode(d);}}

// Filters
let activeFilter='all';
document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter=btn.dataset.filter;
    applyFilter();
  });
});
function applyFilter(){
  const q=document.getElementById('search').value.toLowerCase();
  nodeEl.style('opacity',d=>{
    const s=d._status;
    const r=d.role;
    if(activeFilter==='Alive'&&s!=='Alive') return 0.08;
    if(activeFilter==='Dead'&&s!=='Dead') return 0.08;
    if(activeFilter==='Main'&&r!=='Main') return 0.08;
    if(activeFilter==='Secondary'&&r!=='Secondary') return 0.08;
    if(activeFilter==='Antagonist'&&r!=='Antagonist') return 0.08;
    if(q&&!d.name.toLowerCase().includes(q)&&!d.aliases?.some(a=>a.toLowerCase().includes(q))) return 0.08;
    return 1;
  });
}
document.getElementById('search').addEventListener('input',applyFilter);

// Org pills + legend
const orgSet=new Set(CHARACTERS.map(c=>c._primary_org));
const legendOrgs=document.getElementById('legend-orgs');
const orgFilters=document.getElementById('org-filters');
const activeOrgs=new Set();

orgSet.forEach(org=>{
  const col=ORG_COLORS[org]||'#888';
  const li=document.createElement('div');
  li.className='leg-item';
  li.innerHTML=`<div class="leg-dot" style="background:${col}"></div>${org}`;
  legendOrgs.appendChild(li);

  const pill=document.createElement('div');
  pill.className='org-pill';
  pill.textContent=org;
  pill.style.cssText=`color:${col};border-color:${col}55`;
  pill.onclick=()=>{
    pill.classList.toggle('active');
    if(pill.classList.contains('active')) activeOrgs.add(org); else activeOrgs.delete(org);
    nodeEl.style('opacity',d=>activeOrgs.size===0?1:activeOrgs.has(d._primary_org)?1:0.06);
    linkEl.style('opacity',l=>{
      if(activeOrgs.size===0) return 0.3;
      const ss=l.source._primary_org||l.source.id&&CHARACTERS.find(c=>c.id===l.source.id)?._primary_org;
      const ts=l.target._primary_org||l.target.id&&CHARACTERS.find(c=>c.id===l.target.id)?._primary_org;
      return activeOrgs.has(ss)||activeOrgs.has(ts)?0.7:0.03;
    });
  };
  orgFilters.appendChild(pill);
});

// Stats bar
const alive=CHARACTERS.filter(c=>c._status==='Alive').length;
const dead=CHARACTERS.filter(c=>c._status==='Dead').length;
const unk=CHARACTERS.filter(c=>c._status==='Unknown'||c._status==='Presumed Dead').length;
document.getElementById('stats-bar').innerHTML=
  `${CHARACTERS.length} characters · <span style="color:#4AA86E">${alive} alive</span> · <span style="color:#C4421A">${dead} dead</span> · <span style="color:#888">${unk} unknown</span><br>${links.length} relationships`;

window.addEventListener('resize',()=>{
  W=cont.offsetWidth;H=cont.offsetHeight;
  sim.force('center',d3.forceCenter(W/2,H/2)).alpha(0.2).restart();
});
</script>
</body>
</html>
